apiVersion: apps/v1
kind: Deployment
metadata:
  name: pwa-backend
  labels:
    app: pwa-backend
spec:
  replicas: ${REPLICAS}
  selector:
    matchLabels:
      app: pwa-backend
  template:
    metadata:
      labels:
        app: pwa-backend
    spec:
      containers:
      - name: pwa-backend
        image: ${IMAGE_NAME}:${IMAGE_TAG}
        ports:
        - containerPort: 5000
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
