apiVersion: apps/v1
kind: Deployment
metadata:
  name: pwa-app
  labels:
    app: pwa-app
spec:
  replicas: ${REPLICAS}
  selector:
    matchLabels:
      app: pwa-app
  template:
    metadata:
      labels:
        app: pwa-app
    spec:
      containers:
      - name: pwa-app
        image: ${IMAGE_NAME}:${IMAGE_TAG}
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /index.html
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /index.html
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
