# SonarQube Project Configuration
sonar.projectKey=port-io-pwa-flow
sonar.projectName=Port.io Integrated PWA Flow
sonar.projectVersion=1.0.0

# Path to source directories (comma-separated)
sonar.sources=.

# Exclusions from source analysis
sonar.exclusions=node_modules/**,coverage/**,eslint.config.js,jest.config.js,**/*.test.js,app.test.js

# Path to test directories (comma-separated)
sonar.tests=.
sonar.test.inclusions=**/*.test.js,app.test.js

# Source encoding
sonar.sourceEncoding=UTF-8

# JavaScript Test Coverage reporting
sonar.javascript.lcov.reportPaths=coverage/lcov.info
