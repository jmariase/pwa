# SonarQube Monorepo Configuration
sonar.projectKey=port-io-pwa-flow
sonar.projectName=Port.io Integrated PWA Monorepo
sonar.projectVersion=1.0.0

# Path to source directories (comma-separated)
sonar.sources=frontend,backend

# Exclusions from source analysis
sonar.exclusions=**/node_modules/**,**/coverage/**,eslint.config.js,jest.config.js,configure_port.js,**/*.test.js

# Path to test directories (comma-separated)
sonar.tests=frontend,backend
sonar.test.inclusions=**/*.test.js

# Source encoding
sonar.sourceEncoding=UTF-8

# JavaScript Test Coverage reporting
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
