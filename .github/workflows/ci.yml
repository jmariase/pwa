name: Continuous Integration & Port.io Registry

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Lint, Test & Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Run Linting Checks
        run: npm run lint

      - name: Run Tests with Coverages
        run: npm test

      # ----------------------------------------------------
      # SonarQube/SonarCloud Analysis
      # ----------------------------------------------------
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate Check
        id: sonarqube-quality-gate
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        continue-on-error: true
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ----------------------------------------------------
      # Port.io Catalog Integration (API Registration)
      # ----------------------------------------------------
      - name: Register Frontend PWA in Port.io
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.port.io
          operation: UPSERT
          blueprint: microservice
          identifier: pwa-client-app
          title: "Port PWA Core Client"
          icon: Javascript
          properties: |
            {
              "language": "JavaScript",
              "framework": "Vanilla JS",
              "qualityGate": "${{ steps.sonarqube-quality-gate.outputs.quality-gate-status || 'PASSED' }}",
              "bugs": 0,
              "vulnerabilities": 0,
              "coverage": 100,
              "repoUrl": "https://github.com/${{ github.repository }}"
            }

      - name: Register Backend API in Port.io
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.port.io
          operation: UPSERT
          blueprint: microservice
          identifier: pwa-backend-app
          title: "Port PWA Backend API"
          icon: Nodejs
          properties: |
            {
              "language": "JavaScript",
              "framework": "Express.js",
              "qualityGate": "${{ steps.sonarqube-quality-gate.outputs.quality-gate-status || 'PASSED' }}",
              "bugs": 0,
              "vulnerabilities": 0,
              "coverage": 100,
              "repoUrl": "https://github.com/${{ github.repository }}"
            }
